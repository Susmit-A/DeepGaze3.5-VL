### InternVL3.5-8B LoRA SFT for Scanpath Prediction (Rank 8)
### Using v2 format with proper image-level train/val splits

### model
model_name_or_path: OpenGVLab/InternVL3_5-8B-HF
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
dataset_dir: ${DATASET_DIR}
dataset: scanpath_search_train
eval_dataset: scanpath_search_val
template: intern_vl
cutoff_len: 2048
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: ${OUTPUT_DIR}
logging_steps: 10
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### best model saving (based on eval_loss at each epoch)
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 10.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval
per_device_eval_batch_size: 1
eval_strategy: epoch
